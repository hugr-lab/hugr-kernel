name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  build-jupyterlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JupyterLab build tools
        run: pip install jupyterlab>=4.0.0

      - name: Build labextension
        working-directory: extensions/jupyterlab
        run: |
          jlpm install
          jlpm build:prod

      - name: Verify labextension output
        run: |
          test -d extensions/jupyterlab/hugr_graphql_ide/labextension/static
          echo "labextension build OK"

      - name: Verify wheel builds
        working-directory: extensions/jupyterlab
        run: |
          pip install build hatchling hatch-jupyter-builder hatch-nodejs-version
          cp -r ../../hugr_connection_service .
          python -m build
          ls -la dist/
          echo "Wheel build OK"

      - name: Install and verify extensions
        run: |
          pip install "hugr-perspective-viewer>=0.3.1"
          pip install extensions/jupyterlab/dist/*.whl

          echo "--- labextension list ---"
          LAB_OUT=$(jupyter labextension list 2>&1) || true
          echo "$LAB_OUT"
          echo "$LAB_OUT" | grep "@hugr-lab/jupyterlab-graphql-ide"
          echo "$LAB_OUT" | grep "@hugr-lab/perspective-viewer"

          echo "--- server extension list ---"
          SRV_OUT=$(jupyter server extension list 2>&1) || true
          echo "$SRV_OUT"
          echo "$SRV_OUT" | grep "hugr_connection_service"
          echo "$SRV_OUT" | grep "hugr_perspective"

          echo "All extensions verified OK"

  build-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build VS Code extension
        working-directory: extensions/vscode
        run: |
          npm install
          npm run build

      - name: Verify extension output
        run: |
          test -f extensions/vscode/out/extension.js
          echo "VS Code extension build OK"
